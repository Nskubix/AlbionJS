<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbionJS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
    <script defer src="script.js"></script>
</head>
<body>
    <header class="header">
        <span class="title hover"><a href="#">Albion calculator</a><span class="title-underscore">_</span></span>
        <div class="link-tools">
            <a href="#" class="tool-link-active tool-link hover">CRAFTING SCOUT</a>
            <a href="#" class="tool-link hover">REROLL CALCULATOR (WIP)</a>

        </div>
    </header>
    <div class="flex-wrapper">
    <div class="category-nav-wrapper">
         <nav class="category-nav">
            <button class="equipment-button" data-item-name="Arcane staffs" data-api-name="arcanestaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_ARCANESTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Axes" data-api-name="axe"><img src="https://render.albiononline.com/v1/item/T4_MAIN_AXE.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Bows" data-api-name="bow"><img src="https://render.albiononline.com/v1/item/T4_2H_BOW.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Crossbows" data-api-name="crossbow"><img src="https://render.albiononline.com/v1/item/T4_2H_CROSSBOW.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Cursed staffs" data-api-name="cursedstaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_CURSEDSTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Daggers" data-api-name="dagger"><img src="https://render.albiononline.com/v1/item/T4_MAIN_DAGGER.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Fire staffs" data-api-name="firestaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_FIRESTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Frost staffs" data-api-name="froststaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_FROSTSTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="War gloves" data-api-name="gloves"><img src="https://render.albiononline.com/v1/item/T4_2H_KNUCKLES_SET1.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="War hammers" data-api-name="hammer"><img src="https://render.albiononline.com/v1/item/T4_MAIN_HAMMER.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Holy staffs" data-api-name="holystaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_HOLYSTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Maces" data-api-name="mace"><img src="https://render.albiononline.com/v1/item/T4_MAIN_MACE.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Nature staffs" data-api-name="naturestaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_NATURESTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Quarterstaffs" data-api-name="quaterstaff"><img src="https://render.albiononline.com/v1/item/T4_2H_QUARTERSTAFF.png?size=90" alt="" width="90px" ></button>
            <button class="equipment-button" data-item-name="Spears" data-api-name="spear"><img src="https://render.albiononline.com/v1/item/T4_MAIN_SPEAR.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Sword" data-api-name="sword"><img src="https://render.albiononline.com/v1/item/T4_MAIN_SWORD.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Cloth Cowls" data-api-name="headcloth"><img src="https://render.albiononline.com/v1/item/T4_HEAD_CLOTH_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Cloth Robes" data-api-name="armorcloth"><img src="https://render.albiononline.com/v1/item/T4_ARMOR_CLOTH_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Cloth Sandals" data-api-name="shoescloth"><img src="https://render.albiononline.com/v1/item/T4_SHOES_CLOTH_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Leather Hoods" data-api-name="headleather"><img src="https://render.albiononline.com/v1/item/T4_HEAD_LEATHER_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Leather Jackets" data-api-name="armorleather"><img src="https://render.albiononline.com/v1/item/T4_ARMOR_LEATHER_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Leather Shoes" data-api-name="shoesleather"><img src="https://render.albiononline.com/v1/item/T4_SHOES_LEATHER_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Plate Helmets" data-api-name="headplate"><img src="https://render.albiononline.com/v1/item/T4_HEAD_PLATE_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Plate Armors" data-api-name="armorplate"><img src="https://render.albiononline.com/v1/item/T4_ARMOR_PLATE_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Plate Boots" data-api-name="shoesplate"><img src="https://render.albiononline.com/v1/item/T4_SHOES_PLATE_SET1.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Torches" data-api-name="torches"><img src="https://render.albiononline.com/v1/item/T4_OFF_TORCH.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Tomes" data-api-name="tomes"><img src="https://render.albiononline.com/v1/item/T4_OFF_BOOK.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Shields" data-api-name="shield"><img src="https://render.albiononline.com/v1/item/T4_OFF_SHIELD.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Bags" data-api-name="bag"><img src="https://render.albiononline.com/v1/item/T4_BAG.png?size=90" alt="" width="90px"></button>
            <button class="equipment-button" data-item-name="Capes" data-api-name="cape"><img src="https://render.albiononline.com/v1/item/T4_CAPE.png?size=90" alt="" width="90px"></button>
        </nav>
    </div>
    <main class="main">
    </main>
    </div>
    <div class="loading-screen hidden main-loading-screen"><span class="loader"></span style="text-align:center"><span>loading...</span></div>
    <button class="settings-btn">
        <img src="img/gear.svg" width="45px" alt="">
    </button>
    <div class="loading-screen hidden settings-wrapper">
        <div class="settings">
            <div class="settings-header">
                <span>Settings</span>
                <button class="settings-close-btn"><img src="img/x.svg" alt=""></button>
            </div>

            <div class="settings-city">
                <div class="sell-city-wrapper city-wrapper">
                    <span class="city-label">Sell City</span>
                    <div class="sell-city-btn-dropdown btn-dropdown">
                        <span>Brecilien</span>
                        <img src="img/arrow-down.svg" alt="">
                    </div>
                    <div class="city-dropdown hidden">
                        <button class="city-dropdown-select-btn">Brecilien</button>
                        <button class="city-dropdown-select-btn">Lymhurst</button>
                        <button class="city-dropdown-select-btn">Thetford</button>
                        <button class="city-dropdown-select-btn">Fort Sterling</button>
                        <button class="city-dropdown-select-btn">Bridgewatch</button>
                        <button class="city-dropdown-select-btn">Caerleon</button>
                        <button class="city-dropdown-select-btn">Martlock</button>
                    </div>
                </div>

                <div class="artefact-city-wrapper city-wrapper">
                    <span class="city-label">Artefact Buy City</span>
                    <div class="artefact-city-btn-dropdown btn-dropdown">
                        <span>Lymhurst</span>
                        <img src="img/arrow-down.svg" alt="">
                    </div>
                    <div class="city-dropdown hidden">
                        <button class="city-dropdown-select-btn">Brecilien</button>
                        <button class="city-dropdown-select-btn">Lymhurst</button>
                        <button class="city-dropdown-select-btn">Thetford</button>
                        <button class="city-dropdown-select-btn">Fort Sterling</button>
                        <button class="city-dropdown-select-btn">Bridgewatch</button>
                        <button class="city-dropdown-select-btn">Caerleon</button>
                        <button class="city-dropdown-select-btn">Martlock</button>
                    </div>
                </div>
            </div>
            <div class="settings-checkbox-div">
                <span class="checkbox-label">Premium Account</span>
                <input type="checkbox" name="" id="premium-chkbox" class="settings-checkbox">
                <span class="checkbox-label">Focus</span>
                <input type="checkbox" name="" id="focus-chkbox" class="settings-checkbox">
                <span class="checkbox-label">City Bonus</span>
                <input type="checkbox" name="" id="city-chkbox" class="settings-checkbox" checked>
            </div>
            <div class="settings-bonus-div">
                <span class="settings-bonus-label">Daily bonus (0,10,20)</span>
                <input class="settings-bonus" type="number" name="" id="bonus-input" placeholder=" 0%">
            </div>
            <div class="settings-footer">
                <button class="btn-save">Save Changes</button>
            </div>
            </div>
        </div>
    </div>
</body>
</html>
