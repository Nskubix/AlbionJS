<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbionJS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/icon.png" type="image/x-icon">
</head>
<body>
    <header class="header">
        <span class="title hover"><a href="#">Albion calculator</a><span class="title-underscore">_</span></span>
        <div class="link-tools">
            <a href="#" class="tool-link-active tool-link hover">CRAFTING SCOUT</a>
            <a href="#" class="tool-link hover">REROLL CALCULATOR</a>

        </div>
    </header>
    <div class="category-nav-wrapper">
         <nav class="category-nav">
            <button class="equipment-button" data-item-name="Arcane staff" data-api-name="arcanestaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_ARCANESTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Axe" data-api-name="axe"><img src="https://render.albiononline.com/v1/item/T4_MAIN_AXE.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Bow" data-api-name="bow"><img src="https://render.albiononline.com/v1/item/T4_2H_BOW.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Crossbow" data-api-name="crossbow"><img src="https://render.albiononline.com/v1/item/T4_2H_CROSSBOW.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Cursed staff" data-api-name="cursedstaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_CURSEDSTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Dagger" data-api-name="dagger"><img src="https://render.albiononline.com/v1/item/T4_MAIN_DAGGER.png?size=120" alt="" width="120px"></button>
            <button class="equipment-button" data-item-name="Fire staff" data-api-name="firestaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_FIRESTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Frost staff" data-api-name="froststaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_FROSTSTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="War gloves" data-api-name="gloves"><img src="https://render.albiononline.com/v1/item/T4_2H_KNUCKLES_SET1.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="War hammer" data-api-name="hammer"><img src="https://render.albiononline.com/v1/item/T4_MAIN_HAMMER.png?size=120" alt="" width="120px"></button>
            <button class="equipment-button" data-item-name="Holy staff" data-api-name="holystaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_HOLYSTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Mace" data-api-name="mace"><img src="https://render.albiononline.com/v1/item/T4_MAIN_MACE.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Nature staff" data-api-name="naturestaff"><img src="https://render.albiononline.com/v1/item/T4_MAIN_NATURESTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Quarterstaff" data-api-name="quarterstaff"><img src="https://render.albiononline.com/v1/item/T4_2H_QUARTERSTAFF.png?size=120" alt="" width="120px" ></button>
            <button class="equipment-button" data-item-name="Spear" data-api-name="spear"><img src="https://render.albiononline.com/v1/item/T4_MAIN_SPEAR.png?size=120" alt="" width="120px"></button>
        </nav>
        <button class="category-arrow-right daj-znaka"><img src="img/right-arrow.png" width="75px" alt=""></button>
    </div>


    <script src="script.js"></script>
</body>
</html>
